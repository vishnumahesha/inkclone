<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyph Review — InkClone</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0f; --surface: #12121e; --surface2: #1a1a2e;
    --border: #2a2a3e; --accent: #5a5af0; --accent-dark: #3a3ad0;
    --text: #e8e8f0; --text-dim: #9090a8; --text-faint: #55556a;
    --good: #44cc44; --warn: #ffaa00; --bad: #ff4444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header-back { color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 500; white-space: nowrap; }
  .header-back:hover { color: #8080ff; }
  .header-title { font-size: 16px; font-weight: 600; flex: 1; min-width: 160px; }
  .header-sub { font-size: 11px; color: var(--text-dim); }
  .summary-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .chip-good { background: #1a3a1a; color: var(--good); }
  .chip-warn { background: #3a2e00; color: var(--warn); }
  .chip-bad  { background: #3a1010; color: var(--bad); }
  .chip-total { background: var(--surface2); color: var(--text-dim); }

  /* ── Profile selector ── */
  .profile-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .profile-bar label { font-size: 11px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .profile-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .profile-select:focus { outline: none; border-color: var(--accent); }
  .profile-select option { background: #1a1a22; }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .toolbar-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; white-space: nowrap; }
  .filter-btn, .sort-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .filter-btn:hover, .sort-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .sort-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* ── Grid ── */
  .grid-wrap { padding: 16px 20px; }
  .glyph-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .glyph-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; transition: border-color .15s; cursor: default; }
  .glyph-card:hover { border-color: #4a4a6a; }
  .glyph-card.rejected { border-color: var(--bad); opacity: .55; }
  .glyph-card.warning  { border-color: var(--warn); }
  .glyph-card.good     { border-color: var(--border); }

  .glyph-img-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .glyph-image {
    width: 80px; height: 80px; object-fit: contain; border-radius: 4px; padding: 4px;
    background-image: linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
                      linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
                      linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
    background-size: 10px 10px;
    background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
    background-color: #0c0c0f;
  }
  .glyph-char { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; font-family: monospace; }
  .glyph-variant { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; }
  .glyph-size { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
  .glyph-ar { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; }
  .quality-label { font-size: 10px; font-weight: 600; }
  .quality-good     { color: var(--good); }
  .quality-warning  { color: var(--warn); }
  .quality-rejected { color: var(--bad); }
  .quality-reason { font-size: 9px; color: var(--text-faint); margin-top: 1px; }

  /* ── Empty / loading ── */
  .state-msg { padding: 60px 20px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .state-msg small { display: block; margin-top: 6px; color: var(--text-faint); font-size: 11px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .header { padding: 12px 14px; gap: 10px; }
    .toolbar { padding: 10px 14px; gap: 6px; }
    .grid-wrap { padding: 12px 14px; }
    .glyph-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <a href="/" class="header-back">← Back</a>
  <div>
    <div class="header-title">Your Extracted Characters</div>
    <div class="header-sub" id="header-sub">Loading…</div>
  </div>
  <div class="summary-chips" id="summary-chips"></div>
</div>

<div class="profile-bar">
  <label for="profile-sel">Profile</label>
  <select id="profile-sel" class="profile-select"><option value="">Loading…</option></select>
</div>

<div class="toolbar">
  <span class="toolbar-label">Filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="lowercase">Lowercase</button>
  <button class="filter-btn" data-filter="uppercase">Uppercase</button>
  <button class="filter-btn" data-filter="digits">Digits</button>
  <button class="filter-btn" data-filter="punctuation">Punctuation</button>
  <button class="filter-btn" data-filter="bigrams">Bigrams</button>
  <button class="filter-btn" data-filter="flagged">⚑ Flagged</button>
  <div class="toolbar-sep"></div>
  <span class="toolbar-label">Sort</span>
  <button class="sort-btn active" data-sort="char">Character</button>
  <button class="sort-btn" data-sort="quality">Quality</button>
  <button class="sort-btn" data-sort="size">Size</button>
  <button class="sort-btn" data-sort="ar">AR</button>
</div>

<div class="grid-wrap">
  <div id="grid-container"><div class="state-msg"><div class="spinner"></div><br>Loading glyphs…</div></div>
</div>

<script>
const params  = new URLSearchParams(location.search);
let allGlyphs = [];
let activeFilter = 'all';
let activeSort   = 'char';

/* ── Bootstrap ── */
async function init() {
  await loadProfiles();
  const profile = params.get('profile') || document.getElementById('profile-sel').value || '';
  if (profile) {
    document.getElementById('profile-sel').value = profile;
  }
  await loadGlyphs(document.getElementById('profile-sel').value);
}

async function loadProfiles() {
  try {
    const res = await fetch('/profiles');
    if (!res.ok) return;
    const list = await res.json();
    const sel = document.getElementById('profile-sel');
    sel.innerHTML = list.map(p =>
      `<option value="${p.profile_id}">${p.name}</option>`
    ).join('');
    const want = params.get('profile');
    if (want) sel.value = want;
  } catch { /* ignore */ }
}

async function loadGlyphs(profile) {
  const container = document.getElementById('grid-container');
  container.innerHTML = '<div class="state-msg"><div class="spinner"></div><br>Loading glyphs…</div>';
  try {
    const url = '/api/profile-glyphs' + (profile ? '?profile=' + encodeURIComponent(profile) : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allGlyphs = data.glyphs || [];
    updateSummary(data.summary || {});
    updateHeaderSub(profile, data.summary);
    render();
  } catch (e) {
    container.innerHTML = `<div class="state-msg">Failed to load glyphs<small>${e.message}</small></div>`;
  }
}

function updateSummary(s) {
  const el = document.getElementById('summary-chips');
  el.innerHTML = [
    s.total    ? `<span class="chip chip-total">${s.total} total</span>` : '',
    s.good     ? `<span class="chip chip-good">✓ ${s.good} good</span>` : '',
    s.warnings ? `<span class="chip chip-warn">⚠ ${s.warnings} warn</span>` : '',
    s.rejected ? `<span class="chip chip-bad">✗ ${s.rejected} rejected</span>` : '',
  ].join('');
}

function updateHeaderSub(profile, s) {
  const name = profile ? profile.replace(/_/g, ' ') : 'default';
  const total = s && s.total ? s.total : '?';
  document.getElementById('header-sub').textContent = `${name} · ${total} variants`;
}

/* ── Render grid ── */
function render() {
  let items = allGlyphs.slice();

  // Filter
  if (activeFilter !== 'all') {
    if (activeFilter === 'flagged') {
      items = items.filter(g => g.quality !== 'good');
    } else {
      items = items.filter(g => g.category === activeFilter);
    }
  }

  // Sort
  if (activeSort === 'char') {
    items.sort((a, b) => a.char.localeCompare(b.char) || a.variant - b.variant);
  } else if (activeSort === 'quality') {
    const qord = { rejected: 0, warning: 1, good: 2 };
    items.sort((a, b) => (qord[a.quality] ?? 1) - (qord[b.quality] ?? 1));
  } else if (activeSort === 'size') {
    items.sort((a, b) => (b.width * b.height) - (a.width * a.height));
  } else if (activeSort === 'ar') {
    items.sort((a, b) => b.aspect_ratio - a.aspect_ratio);
  }

  const container = document.getElementById('grid-container');
  if (!items.length) {
    container.innerHTML = '<div class="state-msg">No glyphs match this filter.</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'glyph-grid';

  for (const g of items) {
    const card = document.createElement('div');
    card.className = 'glyph-card ' + g.quality;
    card.dataset.category = g.category;

    const qIcon  = g.quality === 'good' ? '✓' : g.quality === 'warning' ? '⚠' : '✗';
    const qClass = 'quality-' + g.quality;
    const label  = g.char.length > 1 ? `"${g.char}"` : `'${g.char}'`;

    card.innerHTML = `
      <div class="glyph-img-wrap">
        <img class="glyph-image" src="${g.image_url}" alt="${g.char}" loading="lazy">
      </div>
      <div class="glyph-char">${escHtml(g.char)}</div>
      <div class="glyph-variant">variant ${g.variant}</div>
      <div class="glyph-size">${g.width}×${g.height}px</div>
      <div class="glyph-ar">AR ${g.aspect_ratio.toFixed(2)}</div>
      <div class="quality-label ${qClass}">${qIcon} ${cap(g.quality)}</div>
      ${g.quality_reason ? `<div class="quality-reason">${escHtml(g.quality_reason)}</div>` : ''}
    `;
    grid.appendChild(card);
  }

  container.innerHTML = '';
  container.appendChild(grid);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── Events ── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSort = btn.dataset.sort;
    render();
  });
});

document.getElementById('profile-sel').addEventListener('change', function() {
  const url = new URL(location.href);
  url.searchParams.set('profile', this.value);
  history.replaceState(null, '', url);
  loadGlyphs(this.value);
});

init();
</script>
</body>
</html>
